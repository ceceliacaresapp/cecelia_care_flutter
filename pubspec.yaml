name: cecelia_care_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  # --- core ---
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  shared_preferences: ^2.2.3
  provider: ^6.1.2
  badges: ^3.1.2
  go_router: ^17.0.0
  logger: ^2.3.0
  image_picker: ^1.1.2
  rxdart: ^0.28.0
  share_plus: ^7.0.0
  path_provider: ^2.0.0

  # --- UI / chat ---
  cupertino_icons: ^1.0.8
  table_calendar: ^3.1.2
  # UPDATED: Rolled back to stable 1.6.x to match flutter_chat_types 3.6.2
  flutter_chat_ui: ^1.6.14 
  flutter_chat_types: ^3.6.2

  # --- Firebase (latest compatible set) ---
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  firebase_auth: ^6.1.2
  firebase_messaging: ^16.0.4
  firebase_storage: ^13.0.4
  firebase_app_check: ^0.4.1+2
  cloud_functions: ^6.0.4

  # --- notifications / timezone ---
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # --- misc ---
  url_launcher: ^6.3.0
  get_it: ^9.2.0
  http: ^1.6.0
  uuid: ^4.5.2
  permission_handler: ^11.3.1
  csv: ^6.0.0
  pdf: ^3.11.0

  # --- celebrations ---
  confetti: ^0.7.0

  # --- connectivity ---
  connectivity_plus: ^6.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/logo.png
    - assets/images/badges/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
